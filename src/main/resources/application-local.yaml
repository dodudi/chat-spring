spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080
  autoconfigure:
    exclude: org.springframework.boot.kafka.autoconfigure.KafkaAutoConfiguration
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
